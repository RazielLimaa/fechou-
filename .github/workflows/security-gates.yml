name: Security Gates

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  merge-conflict-markers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check conflict markers
        run: |
          if rg -n "^(<<<<<<<|=======|>>>>>>>)" .; then
            echo "Merge conflict markers found" >&2
            exit 1
          fi

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/typescript

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run npm audit (fail on vulnerabilities, tolerate endpoint outages)
        run: |
          set +e
          npm audit --omit=dev --audit-level=high > audit.log 2>&1
          status=$?
          set -e

          cat audit.log

          if [ $status -eq 0 ]; then
            exit 0
          fi

          if rg -n "audit endpoint returned an error|403 Forbidden|EAI_AGAIN|ECONNRESET|ETIMEDOUT" audit.log >/dev/null; then
            echo "npm audit endpoint unavailable; not failing gate due upstream connectivity/registry issue."
            exit 0
          fi

          exit $status

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
